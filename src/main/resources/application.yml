spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/accessguard}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: false

  flyway:
    enabled: true

server:
  port: ${PORT:8080}